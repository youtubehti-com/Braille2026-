<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام برايل الهجين المطور - النسخة المؤمنة</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --bg: #050505; --cyan: #00f3ff; --purple: #bc13fe; --key-bg: rgba(25, 25, 25, 0.9); --red: #ff3b3b; --glass: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); }
        #display-section { height: 22vh; background: var(--glass); backdrop-filter: blur(15px); border-bottom: 2px solid var(--cyan); padding: 10px; display: flex; flex-direction: column; }
        #output { flex: 1; background: transparent; border: none; color: var(--cyan); font-size: 22px; resize: none; outline: none; text-align: right; text-shadow: 0 0 8px var(--cyan); font-weight: bold; }
        #braille-preview { height: 30px; color: var(--purple); font-size: 18px; border-top: 1px solid #333; padding-top: 5px; overflow-x: auto; white-space: nowrap; }
        #keyboard-container { height: 55vh; overflow-y: auto; background: transparent; }
        #keyboard-sighted { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; padding: 10px; }
        #keyboard-blind { display: none; grid-template-columns: 1fr 1fr; gap: 30px; padding: 20px; }
        .cluster-main { background: radial-gradient(circle, #222 0%, #000 100%); border: 2px solid var(--purple); border-radius: 50%; position: relative; aspect-ratio: 1/1; }
        .sub-key { position: absolute; width: 60px; height: 60px; background: #111; border: 2px solid var(--cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; box-shadow: 0 0 10px var(--cyan); touch-action: manipulation; }
        .sub-key:active { background: var(--cyan); color: #000; }
        .pos-0 { right: -5%; top: 35%; } .pos-1 { right: 15%; top: -5%; } .pos-2 { left: 15%; top: -5%; } .pos-3 { left: -5%; top: 35%; } .pos-4 { left: 15%; bottom: -5%; } .pos-5 { right: 15%; bottom: -5%; }
        .key-s { background: var(--key-bg); border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55px; cursor: pointer; }
        .key-s b { font-size: 18px; color: var(--purple); }
        #nav-bar { height: 18vh; display: grid; grid-template-columns: repeat(5, 20%); background: #000; border-top: 2px solid var(--purple); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #fff; cursor: pointer; border: 0.1px solid #222; text-align: center; }
        .nav-btn b { color: var(--cyan); font-size: 14px; }
        #banner-ad-wrapper { height: 5vh; background: #000; display: flex; justify-content: center; align-items: center; }
        .popup-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 90%; background: rgba(0,0,0,0.95); border: 2px solid var(--cyan); border-radius: 15px; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; z-index: 10001; transition: 0.2s; }
        .popup-menu.active { transform: translate(-50%, -50%) scale(1); }
        #mode-toggle { position: fixed; top: 10px; left: 10px; z-index: 10002; background: var(--purple); border: none; color: #fff; padding: 8px 15px; border-radius: 15px; font-weight: bold; box-shadow: 0 0 10px var(--purple); cursor: pointer; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; display: none; }
    </style>
</head>
<body onclick="_v._x()">

<div id="overlay"></div>
<button id="mode-toggle" onclick="event.stopPropagation(); _v._t()">🔄 وضع التشغيل</button>

<div id="display-section" onclick="event.stopPropagation()">
    <textarea id="output" readonly placeholder="سوف يظهر النص هنا..."></textarea>
    <div id="braille-preview" dir="ltr"></div>
</div>

<div id="keyboard-container">
    <div id="keyboard-sighted" onclick="event.stopPropagation()"></div>
    <div id="keyboard-blind" onclick="event.stopPropagation()"></div>
</div>

<div id="nav-bar" onclick="event.stopPropagation()">
    <div class="nav-btn" onclick="_v._uc(this, () => _v._p('pop-nums', 'الأرقام'), 'أرقام')">🔢<br>أرقام<br><b>⠼</b></div>
    <div class="nav-btn" onclick="_v._uc(this, () => _v._p('pop-tashkeel', 'التشكيل'), 'تشكيل')">✨<br>تشكيل<br><b>⠠</b></div>
    <div class="nav-btn" onclick="_v._uc(this, () => _v._p('pop-punct', 'علامات الترقيم'), 'ترقيم')">❓<br>ترقيم<br><b>⠦</b></div>
    <div class="nav-btn" onclick="_v._uc(this, () => _v._p('pop-hamzas', 'الهمزات'), 'همزات')">ء<br>همزات<br><b>⠄</b></div>
    <div class="nav-btn" onclick="_v._uc(this, _v._b, 'حذف')" style="color:var(--red)">🔙<br>حذف<br><b>⠡</b></div>
    <div class="nav-btn" onclick="_v._uc(this, _v._sa, 'نطق النص')">🔊<br>نطق النص</div>
    <div class="nav-btn" onclick="_v._uc(this, _v._cy, 'نسخ')">📋<br>نسخ</div>
    <div class="nav-btn" onclick="_v._uc(this, _v._cl, 'مسح الكل')">🗑️<br>مسح الكل</div>
    <div class="nav-btn" onclick="_v._uc(this, _v._ex, 'حفظ كملف وورد')">💾<br>Word</div>
    <div class="nav-btn" onclick="_v._uc(this, _v._s, 'مسافة')" style="background:var(--cyan); color:#000;">␣<br>مسافة</div>
</div>
<div id="banner-ad-wrapper"><div id="Banner_Android"></div></div>

<div id="pop-nums" class="popup-menu" onclick="event.stopPropagation()"></div>
<div id="pop-tashkeel" class="popup-menu" onclick="event.stopPropagation()"></div>
<div id="pop-punct" class="popup-menu" onclick="event.stopPropagation()"></div>
<div id="pop-hamzas" class="popup-menu" onclick="event.stopPropagation()"></div>

<script>
const _v = (function() {
    // عدادات الإعلانات
    let adsCounter = { spk: 0, clr: 0, spc: 0, lng: 0, wrd: 0, trn: 0 };
    function checkAds(type) {
        adsCounter[type]++;
        if((type === 'spk' && adsCounter.spk >= 20) || (type === 'clr' && adsCounter.clr >= 15) || 
           (type === 'spc' && adsCounter.spc >= 18) || (type === 'lng' && adsCounter.lng >= 1) || 
           (type === 'wrd' && adsCounter.wrd >= 1) || (type === 'trn' && adsCounter.trn >= 7)) {
            console.log("Interstitial_Android"); // سيتم استبداله برمز الإعلان الفعلي
            adsCounter = { spk: 0, clr: 0, spc: 0, lng: 0, wrd: 0, trn: 0 };
        }
    }

    const _0xData = { /* بيانات برايل كما هي */ };
    let _isBlind = false, _buffer = [], _lt = 0, _ltg = null;

    const _speak = (t) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'ar-SA'; window.speechSynthesis.speak(u); };
    const _up = () => { document.getElementById('braille-preview').innerText = _buffer.join(''); };

    return {
        _uc: function(el, action, desc) {
            _speak(desc || el.innerText);
            if (!_isBlind) { action(); } else { /* منطق الكفيف */ }
        },
        _i: function(c) { document.getElementById('output').value += c; _up(); },
        _s: function() { checkAds('spc'); document.getElementById('output').value += " "; _up(); },
        _b: function() { document.getElementById('output').value = document.getElementById('output').value.slice(0,-1); _up(); },
        _cl: function() { checkAds('clr'); document.getElementById('output').value = ""; _buffer=[]; _up(); },
        _t: function() { 
            console.log("Rewarded_Android"); // تفعيل Rewarded
            checkAds('lng'); 
            _isBlind = !_isBlind; 
            _speak(_isBlind ? "وضع الكفيف" : "وضع المبصر"); 
        },
        _sa: function() { checkAds('spk'); },
        _ex: function() { checkAds('wrd'); },
        _r: function() { checkAds('trn'); },
        _x: function() { document.querySelectorAll('.popup-menu').forEach(p => p.classList.remove('active')); document.getElementById('overlay').style.display = 'none'; }
    };
})();
</script>
</body>
</html>
