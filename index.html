<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الأذكار اليومي</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#0b0b0b;
    color:white;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:20px;
    color:#00f3ff;
    font-weight:bold;
}

.container{
    padding:15px;
}

.section-title{
    margin:20px 0 10px;
    color:#bc13fe;
    font-size:18px;
    font-weight:bold;
}

.card{
    background:#161616;
    margin-bottom:15px;
    padding:15px;
    border-radius:12px;
    border:1px solid #222;
}

.title{
    font-size:16px;
    margin-bottom:10px;
    color:#fff;
}

.counter{
    font-size:14px;
    margin-bottom:10px;
    color:#ccc;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#00f3ff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    margin-top:5px;
}

.progress{
    width:100%;
    height:12px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.bar{
    height:100%;
    width:0%;
    background:#00f3ff;
    transition:0.3s;
}

.points{
    position:fixed;
    top:10px;
    left:10px;
    background:#bc13fe;
    padding:10px 15px;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="points">⭐ النقاط: <span id="points">0</span></div>

<header>نظام الأذكار اليومي ✨</header>

<div class="container">

<div class="section-title">🌅 أذكار الصباح</div>

<div id="morning"></div>

<div class="section-title">🌙 أذكار المساء</div>

<div id="evening"></div>

</div>

<script>

let points = 0;

const athkar = [
    // 🌅 الصباح
    {id:"m1", text:"أصبحنا وأصبح الملك لله", target:20, section:"morning"},
    {id:"m2", text:"سبحان الله وبحمده", target:100, section:"morning"},
    {id:"m3", text:"لا إله إلا الله وحده لا شريك له", target:10, section:"morning"},
    {id:"m4", text:"أستغفر الله", target:100, section:"morning"},
    {id:"m5", text:"اللهم بك أصبحنا وبك أمسينا", target:1, section:"morning"},

    // 🌙 المساء
    {id:"e1", text:"أمسينا وأمسى الملك لله", target:20, section:"evening"},
    {id:"e2", text:"سبحان الله وبحمده", target:100, section:"evening"},
    {id:"e3", text:"لا إله إلا الله وحده لا شريك له", target:10, section:"evening"},
    {id:"e4", text:"أستغفر الله", target:100, section:"evening"},
    {id:"e5", text:"اللهم بك أمسينا وبك أصبحنا", target:1, section:"evening"}
];

let data = {};

athkar.forEach(a=>{
    data[a.id]=0;
});

function render(){
    athkar.forEach(a=>{
        let section = document.getElementById(a.section);

        let card = document.createElement("div");
        card.className="card";

        card.innerHTML=`
        <div class="title">${a.text}</div>
        <div class="counter" id="c_${a.id}">0 / ${a.target}</div>

        <button onclick="add('${a.id}',${a.target})">+ ذكر</button>

        <div class="progress">
            <div class="bar" id="b_${a.id}"></div>
        </div>
        `;

        section.appendChild(card);
    });
}

function add(id,target){

    data[id]++;

    let percent = (data[id]/target)*100;

    document.getElementById("c_"+id).innerText =
        data[id] + " / " + target;

    document.getElementById("b_"+id).style.width =
        percent + "%";

    points += 1;
    document.getElementById("points").innerText = points;

    if(data[id] === target){
        alert("🎉 تم إكمال الذكر اليومي");
        points += 20;
    }
}

render();

</script>

</body>
</html>
